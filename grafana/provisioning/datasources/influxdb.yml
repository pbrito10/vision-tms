apiVersion: 1

deleteDatasources:
  - name: Vision TMS InfluxDB
    orgId: 1

datasources:
  - name: Vision TMS InfluxDB
    uid: vision-tms-influxdb
    orgId: 1
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: true
    jsonData:
      version: Flux
      organization: vision-tms
      defaultBucket: vision_tms
    secureJsonData:
      token: vision-tms-dev-token
