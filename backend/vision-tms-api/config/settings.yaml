system:
  line_name: Line A-07
  program_name: Industrial Assembly
  part_number: ITR-001
  camera_serial: CAM-TMS-01-9482
camera:
  index: 0
  width: 640
  height: 480
  flip: true
  calibration_path: calibration/data/lens_calibration.npz
  perspective_path: ''
  open_timeout_seconds: 5
  open_retry_interval_seconds: 0.2
detection:
  model_path: model/hand_landmarker.task
  max_num_hands: 2
  min_detection_confidence: 0.8
  min_hand_presence_confidence: 0.5
  min_tracking_confidence: 0.8
tracking:
  dwell_time_seconds: 0.3
  task_timeout_seconds: 30.0
  stillness_threshold_px: 8.0
  zones:
  - chassi inferior
  - chassi superior
  - rodas
  - porca
  - parafuso
  - montagem
  - saida
  two_hands_zones:
  - montagem
  two_hands_missing_tolerance_seconds: 0.3
  assembly_zone: montagem
  assembly_task_labels:
    chassi inferior: montagem chassi inferior
    chassi superior: montagem chassi superior
    rodas: montagem rodas
    porca: montagem porca
    parafuso: montagem parafuso
  cycle_zone_order:
  - porca
  - montagem
  - chassi inferior
  - montagem
  - rodas
  - montagem
  - chassi superior
  - montagem
  - parafuso
  - montagem
  - saida
  cycle_repeat_rules:
  - sequence:
    - rodas
    - montagem
    min_repeats: 1
    max_repeats: 4
  start_zone: porca
  exit_zone: saida
  detection_gap_threshold_s: 1.0
dashboard:
  frame_path: dashboard/data/program_frame.jpg
  state_path: dashboard/data/program_state.json
  refresh_seconds: 1
influxdb:
  enabled: true
  url: http://influxdb:8086
  org: vision-tms
  bucket: vision_tms
  token_env: INFLUXDB_TOKEN
  measurement_prefix: vision_tms
  batch_size: 50
  flush_interval_seconds: 1
  timeout_seconds: 1.5
  queue_size: 1000
output:
  excel_output_dir: output/
  sessions_subdir: sessions
  record_video: true
  video_fps: 10.0
